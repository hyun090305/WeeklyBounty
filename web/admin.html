<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>수올러 (Suoller) Admin/Setter</title>
  <link rel="stylesheet" href="styles.css" />
  <script type="module" src="admin.js"></script>
</head>
<body>
  <main class="container">
    <h1>Admin / Setter Panel</h1>
    <p id="adminAuthState"></p>

    <section class="card grid2">
      <div>
        <h2>문제 생성/수정</h2>
        <input id="problemId" placeholder="problemId (예: 2026w20)" />
        <input id="weekLabel" placeholder="Week 20" />
        <input id="setterName" placeholder="setter 이름" />
        <input id="setterUid" placeholder="setter uid" />
        <input id="tags" placeholder="tags: nt,geo" />
        <textarea id="statement" placeholder="문제 본문(Markdown+LaTeX)"></textarea>
        <textarea id="officialSolution" placeholder="공식 해설"></textarea>
        <button id="upsertProblemBtn">문제 저장</button>
      </div>
      <div>
        <h2>상태/결과 관리</h2>
        <input id="targetProblemId" placeholder="대상 problemId" />
        <select id="nextStatus">
          <option>scheduled</option><option>open</option><option>closed</option><option>grading</option><option>published</option>
        </select>
        <button id="changeStatusBtn">상태 변경</button>
        <input id="bestSubmissionId" placeholder="best submission id" />
        <button id="pickBestBtn">Best Solution 지정</button>
        <button id="runRatingBtn">Rating 업데이트 실행</button>
      </div>
    </section>

    <section class="card">
      <h2>익명 채점</h2>
      <input id="gradingProblemId" placeholder="problemId" />
      <button id="loadSubmissionsBtn">제출 목록 불러오기</button>
      <table>
        <thead><tr><th>Anon Code</th><th>Proof</th><th>Score</th><th>Comment</th><th></th></tr></thead>
        <tbody id="gradingBody"></tbody>
      </table>
    </section>
  </main>
</body>
</html>
