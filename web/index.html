<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>수올러 (Suoller)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>
  <link rel="stylesheet" href="styles.css" />
  <script type="module" src="app.js"></script>
</head>
<body>
  <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-2"></div>

  <header class="topbar glass">
    <div class="brand-wrap">
      <p class="kicker">Math Challenge Platform</p>
      <h1>수올러 (Suoller)</h1>
    </div>
    <nav>
      <button class="tab-btn active" data-tab="problem">문제</button>
      <button class="tab-btn" data-tab="leaderboard">리더보드</button>
      <a class="admin-link" href="admin.html">Admin/Setter</a>
    </nav>
    <div class="auth-row">
      <span id="authState">로그아웃 상태</span>
      <button id="loginBtn" class="btn btn-primary">Google 로그인</button>
      <button id="logoutBtn" class="btn btn-secondary" hidden>로그아웃</button>
    </div>
  </header>

  
  <main class="container">
    <section class="tab-pane" data-pane="problem">
      <section id="problem" class="card problem-card glass">
        <div class="problem-header-row">
          <button id="prevWeekBtn" class="week-nav-btn" type="button">←</button>
          <div class="problem-center">
            <p class="status">Status: <strong id="statusBadge">-</strong></p>
            <h2 id="problemTitle">문제 로딩 중...</h2>
            <p id="problemMeta" class="meta"></p>
          </div>
          <button id="nextWeekBtn" class="week-nav-btn" type="button">→</button>
        </div>
        <div class="problem-subheader">
          <span class="pill">Weekly Featured</span>
          <span id="weekNavLabel" class="week-label">-</span>
        </div>
        <article id="problemStatement" class="statement"></article>
      </section>

      <section class="card glass">
        <h3>내 제출 (Markdown + LaTeX)</h3>
        <textarea id="submissionInput" placeholder="증명/아이디어를 작성하세요..."></textarea>
        <label class="toggle-row"><input id="publicToggle" type="checkbox" checked /> 마감 후 공개 제출 목록에 내 풀이 공개</label>
        <div class="action-row"><button id="saveSubmissionBtn" class="btn btn-primary">저장/수정</button></div>
        <small id="submissionNote"></small>
      </section>

      <section id="archive" class="card glass">
        <h3>문제 아카이브</h3>
        <table>
          <thead><tr><th>Week</th><th>Setter</th><th>태그</th><th>공개일</th><th>상태</th></tr></thead>
          <tbody id="archiveBody"></tbody>
        </table>
      </section>
    </section>

    <section id="leaderboard" class="card glass tab-pane" data-pane="leaderboard" hidden>
      <h3>전체 리더보드 (공개 / Rating 기준)</h3>
      <ol id="leaderboardList"></ol>
    </section>
  </main>

</body>
</html>
