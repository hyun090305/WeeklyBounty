<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>수올러 (Suoller) Admin/Setter</title>
  <link rel="stylesheet" href="styles.css" />
  <script type="module" src="admin.js"></script>
</head>
<body>
  <main class="container admin-container">
    <header class="admin-header card">
      <div>
        <h1>Admin / Setter Panel</h1>
        <p class="meta">복잡한 입력을 줄이기 위해 단계별로 구성된 관리 화면입니다.</p>
      </div>
      <p id="adminAuthState" class="pill"></p>
    </header>

    <section class="card admin-workspace">
      <div class="admin-tabs" role="tablist" aria-label="관리 메뉴">
        <button class="admin-tab active" data-tab="problemEditor" role="tab">문제 작성</button>
        <button class="admin-tab" data-tab="statusPanel" role="tab">상태/결과</button>
        <button class="admin-tab" data-tab="gradingPanel" role="tab">익명 채점</button>
      </div>

      <div id="problemEditor" class="admin-pane active" role="tabpanel">
        <h2>문제 생성/수정</h2>
        <div class="form-grid compact-grid">
          <label>주차 선택
            <select id="weekRange"></select>
          </label>
          <label>생성될 Problem ID<input id="generatedProblemId" readonly /></label>
        </div>
        <label>태그 (쉼표 구분)<input id="tags" placeholder="예: nt, geo" /></label>
        <label>문제 본문 (Markdown + LaTeX)<textarea id="statement" placeholder="문제 본문을 입력하세요."></textarea></label>
        <label>공식 해설<textarea id="officialSolution" placeholder="공식 해설을 입력하세요."></textarea></label>
        <div class="action-row sticky-actions">
          <button id="upsertProblemBtn" class="btn btn-primary">문제 저장</button>
        </div>
      </div>

      <div id="statusPanel" class="admin-pane" role="tabpanel">
        <h2>상태/결과 관리 (주차 기반 자동)</h2>
        <div class="form-grid compact-grid">
          <label>대상 Problem ID<input id="targetProblemId" placeholder="예: 2026w20" /></label>
          <label>다음 상태
            <select id="nextStatus">
              <option>scheduled</option><option>open</option><option>closed</option><option>grading</option><option>published</option>
            </select>
          </label>
        </div>
        <div class="action-row grouped-actions">
          <button id="changeStatusBtn" class="btn btn-secondary">상태 변경</button>
        </div>

        <div class="divider"></div>

        <label>Best Submission ID<input id="bestSubmissionId" placeholder="best submission id" /></label>
        <div class="action-row grouped-actions">
          <button id="pickBestBtn" class="btn btn-secondary">Best Solution 지정</button>
          <button id="runRatingBtn" class="btn btn-primary">Rating 업데이트 실행</button>
        </div>
      </div>

      <div id="gradingPanel" class="admin-pane" role="tabpanel">
        <h2>익명 채점</h2>
        <div class="form-grid compact-grid">
          <label>Problem ID<input id="gradingProblemId" placeholder="problemId" /></label>
          <div class="inline-button-wrap">
            <button id="loadSubmissionsBtn" class="btn btn-primary">제출 목록 불러오기</button>
          </div>
        </div>
        <div class="table-wrap">
          <table>
            <thead><tr><th>Anon Code</th><th>Proof</th><th>Score</th><th>Comment</th><th></th></tr></thead>
            <tbody id="gradingBody"></tbody>
          </table>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
